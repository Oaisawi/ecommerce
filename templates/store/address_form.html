{% extends "base.html" %}

{% block title %}{{ title }} — Epic AI Reads{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14">
    <a href="{% url 'profile' %}" class="inline-flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-brand-600 transition-colors mb-6">← Back to Profile</a>
    <div class="mb-6">
        <h1 class="font-serif font-bold text-3xl text-epic-dark">{{ title }}</h1>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 sm:p-8">
        <form method="post" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-bold text-gray-700 mb-1.5">
                    {{ field.label }}{% if field.field.required %} *{% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-600 text-xs mt-1 font-medium">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <div class="flex flex-col sm:flex-row gap-3 pt-2">
                <button type="submit" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-black uppercase tracking-wider px-6 py-3.5 rounded-xl transition-colors text-sm">Save Address</button>
                <a href="{% url 'profile' %}" class="flex-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 font-bold px-6 py-3.5 rounded-xl transition-colors text-sm text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>
<style>
input[type="text"], input[type="tel"], select, textarea {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    padding: 0.625rem 0.875rem;
    font-size: 0.875rem;
    color: #111827;
    background: #f9fafb;
    outline: none;
}
input:focus, select:focus, textarea:focus {
    border-color: #e11d48;
    box-shadow: 0 0 0 2px rgba(225,29,72,0.12);
    background: #fff;
}
input[type="checkbox"] {
    accent-color: #e11d48;
    width: 1rem;
    height: 1rem;
}
</style>
{% endblock %}
